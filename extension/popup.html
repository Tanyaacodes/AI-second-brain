<!DOCTYPE html>
<html>
<head>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap');
    
    body {
      width: 320px;
      margin: 0;
      padding: 0;
      background: #050505;
      color: white;
      font-family: 'Outfit', sans-serif;
      overflow: hidden;
    }

    .container {
      padding: 24px;
      position: relative;
    }

    .hidden { display: none !important; }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .icon {
      width: 32px;
      height: 32px;
      background: #f59e0b;
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(245, 158, 11, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    h1 {
      font-size: 20px;
      font-weight: 900;
      margin: 0;
      font-style: italic;
      letter-spacing: -1px;
    }

    .input-group {
      margin-bottom: 16px;
    }

    label {
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: rgba(255, 255, 255, 0.3);
      display: block;
      margin-bottom: 8px;
    }

    .preview-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      padding: 12px;
      margin-bottom: 20px;
    }

    .preview-title {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .preview-url {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.3);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    input {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 12px;
      color: white;
      font-family: inherit;
      box-sizing: border-box;
      outline: none;
      transition: all 0.3s;
    }

    input:focus {
      border-color: #f59e0b50;
      background: rgba(255, 255, 255, 0.08);
    }

    button {
      width: 100%;
      background: white;
      color: black;
      border: none;
      border-radius: 14px;
      padding: 14px;
      font-weight: 900;
      font-size: 12px;
      cursor: pointer;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    button:hover {
      background: #f59e0b;
      color: white;
      transform: scale(1.02);
    }

    button:active {
      transform: scale(0.98);
    }

    .logout-btn {
      width: auto;
      padding: 8px;
      background: transparent;
      color: rgba(255, 255, 255, 0.3);
      font-size: 9px;
      border: 1px solid transparent;
    }

    .logout-btn:hover {
        background: rgba(239, 68, 68, 0.1);
        color: #ef4444;
        border-color: rgba(239, 68, 68, 0.2);
    }

    .status {
      font-size: 10px;
      text-align: center;
      margin-top: 12px;
      color: rgba(255, 255, 255, 0.2);
    }

    .success {
      color: #10b981 !important;
    }

    .badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 9px;
      background: #f59e0b20;
      color: #f59e0b;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-left">
        <div class="icon">✨</div>
        <h1>Burfi</h1>
      </div>
      <button id="logoutBtn" class="logout-btn hidden">LOGOUT</button>
    </div>

    <!-- LOGIN VIEW -->
    <div id="loginView" class="hidden">
        <div class="input-group">
            <label>Email</label>
            <input type="email" id="loginEmail" placeholder="you@example.com">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="loginPassword" placeholder="••••••••">
        </div>
        <button id="doLoginBtn">LINK BRAIN</button>
        <div id="loginStatus" class="status">Authentication required.</div>
    </div>

    <!-- MAIN SAVE VIEW -->
    <div id="saveView">
        <div class="preview-card">
          <div id="title" class="preview-title">Detecting Page...</div>
          <div id="url" class="preview-url">Searching Neural Link...</div>
          <div id="suggestedTags" class="badge">AI Suggesting...</div>
        </div>

        <div class="input-group">
          <label>Neural Tags (Optional)</label>
          <input type="text" id="tags" placeholder="e.g. AI, React, Startups">
        </div>

        <div class="input-group">
          <label>Quick Note / Selection</label>
          <input type="text" id="content" placeholder="Why save this?">
        </div>

        <button id="saveBtn">
          <span>MIRROR TO BRAIN</span>
        </button>

        <div id="status" class="status">Neural link ready.</div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
